name: Deploy MyST docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Project page lives at https://<user>.github.io/<repo>/, so MyST needs
  # the repository name as the base URL.
  BASE_URL: /${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs execution dependencies
        # The docs contain executable {code-cell} blocks; MyST needs a Jupyter
        # kernel and the rle-python package (to import rle.core and read the
        # bundled sample data) to run them. Core dependencies are enough — the
        # cloud, Earth Engine, viz, and to_raster snippets are static.
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-server ipykernel
          pip install .
          python -m ipykernel install --user --name python3

      - name: Install MyST
        run: npm install -g mystmd

      - name: Build HTML
        working-directory: docs
        run: myst build --html --execute

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
